<!-- MAIN -->
    <main class="contact" id="contact">
        <section>
            <div class="container my-4 pb-3 position-relative">
                <h1 class="text-center">Contact <span class="gradient-text">Me</span></h1>

                <!-- FORM -->
                <form class="contact-form needs-validation my-4" novalidate>
                    <div class="row g-2">
                        <div class="col-md-6">
                            <div class="form-floating m-3">
                                <input name="firstName" type="text" class="form-control" id="floatingInput" placeholder="John" id="validationCustomUserFirstName" required>
                                <label for="floatingInput">First name</label>
                                <div class="invalid-feedback">
                                    Please provide valid first name
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating m-3">
                                <input name="lastName" type="text" class="form-control" id="floatingInput" placeholder="Doe" id="validationCustomUserLastName" required>
                                <label for="floatingInput">Last name</label>
                                <div class="invalid-feedback">
                                    Please provide valid last name
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row g-2">
                        <div class="col-md-6">
                            <div class="form-floating m-3">
                                <input name="phone" type="tel" class="form-control" id="floatingInput" placeholder="1234-567-8900" id="validationCustomUserPhone" pattern="^\d{4}-\d{3}-\d{4}$" required>
                                <label for="floatingInput">Phone number</label>
                                <div class="invalid-feedback">
                                    Please provide valid phone number (1234-567-8900)
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating m-3">
                                <input name="email" type="email" class="form-control" id="floatingInput" placeholder="name@example.com" id="validationCustomUserEmail" required>
                                <label for="floatingInput">Email address</label>
                                <div class="invalid-feedback">
                                    Please provide valid email
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row g-2 justify-content-center">
                        <div class="col-md-8">
                            <div class="form-floating m-3">
                                <textarea name="message" class="form-control" placeholder="Message" id="floatingTextarea" style="height: 100px"></textarea>
                                <label for="floatingTextarea">Message</label>
                            </div>
                        </div>
                    </div>

                    <div class="container mt-4">
                        <div class="row justify-content-center align-items-center">
                            <div class="col text-center">
                                <button type="submit" class="btn btn-custom w-100">Submit</button>
                            </div>
                        </div>
                    </div>
                </form>
                <!-- ----------- -->
                <!-- SOCIAL ICONS -->
                <div class="container text-center">
                    <div class="social-icons-group">
                        <a href="https://github.com/Allways0n" class="btn" target="_blank">
                        <i class='bx bxl-github'></i>
                        </a>
                        <a href="https://linkedin.com/in/kyrylo-kramarchuk" class="btn" target="_blank">
                            <i class="bx bxl-linkedin-square"></i>
                        </a>
                        <a href="https://x.com/sav3rt3ka" class="btn" target="_blank">
                            <i class="bx bxl-twitter"></i>
                        </a>
                        <a href="mailto:kyrylo.kramarchuk@gmail.com" class="btn">
                            <i class="bx bx-envelope"></i>
                        </a>
                    </div>
                </div>
                <!-- ----------- -->
                 <!-- DOWNLOAD CV -->
                 <div class="container mt-4 pb-5">
                    <div class="row justify-content-center align-items-center">
                        <div class="col text-center">

                                <button type="submit" class="btn btn-custom btn-download">Download CV</button>
                            </a>
                        </div>
                    </div>

                 <!-- ----------- -->
